
<div class="page-header">
  <h2>My Profile</h2>
  <p>Your RoomFix registered details</p>
</div>
<div class="content-card" style="max-width: 600px;">
  <div style="padding: 24px;">
    <div style="display: flex; gap: 24px; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-soft); padding-bottom: 24px;">
      <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--primary-soft); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700;">
        {{user.name.charAt(0).toUpperCase()}}
      </div>
      <div>
        <h3 style="margin: 0 0 8px 0; font-size: 24px; color: var(--text-main);">{{user.name}}</h3>
        <span class="badge badge-resolved">Active Student</span>
      </div>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
      <div>
        <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase;">SAP ID</div>
        <div style="font-size: 16px; color: var(--text-main);">{{user.sapid}}</div>
      </div>
      <div>
        <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase;">Room Number</div>
        <div style="font-size: 16px; color: var(--text-main);">{{user.room}}</div>
      </div>
      <div style="grid-column: span 2;">
        <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase;">College Email Address</div>
        <div style="font-size: 16px; color: var(--text-main);">{{user.email}}</div>
      </div>
    </div>
  </div>
</div>
